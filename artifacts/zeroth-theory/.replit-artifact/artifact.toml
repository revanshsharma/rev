kind = "web"
previewPath = "/"
title = "ZeroTheory"
version = "1.0.0"
id = "artifacts/zeroth-theory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22502

[services.development]
run = "pnpm --filter @workspace/zeroth-theory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zeroth-theory", "run", "build" ]
publicDir = "artifacts/zeroth-theory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22502"
BASE_PATH = "/"
