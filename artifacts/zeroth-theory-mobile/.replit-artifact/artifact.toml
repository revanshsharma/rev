kind = "mobile"
previewPath = "/zeroth-theory-mobile/"
title = "ZeroTheory Mobile"
version = "1.0.0"
id = "artifacts/zeroth-theory-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/zeroth-theory-mobile/" ]
localPort = 23704

[services.development]
run = "pnpm --filter @workspace/zeroth-theory-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zeroth-theory-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/zeroth-theory-mobile", "run", "serve" ]

[services.env]
PORT = "23704"
BASE_PATH = "/zeroth-theory-mobile/"
